body:
  text: 西京福壽寺沙門如理師撰祕曰頌云譬如工畫師至一切唯心起者意云此證説唯識所以工畫師雖然能畫而不知是自心能畫雖然不知要由心故而能畫也諸法性如是者一切凡夫雖見諸法等不知諸法從自心變但是迷故不知然此諸法要由心變而方得有也若人知心行普造諸世間者意説若人知諸世間是自心變作者是人則見佛了佛真實性若知世間虗幻了是自心變者則知真如真實性也而是實有若能觀真如法界性者即三世諸佛皆是自心起何以故法界之原無佛非佛名言斷故故知所見佛等但是自心起也問畫師豈不知心畫耶答據多分説祕曰但表得中云離廣略者意云但説中道即離廣略不是廣表得中道也以廣略皆非中故但説中即離廣略名等祕曰一云亦無者無色身也亦唯能見識之變者意云雖無所見佛身言有佛者亦唯是能見者識之自變如文義等外例釋也祕曰雖無本質所以者意云佛不説法無本質所似然似向自內心無爽也問何故名等似向內心耶答衆生見佛謂佛實説所生文義即此文義似自內心也何以得知猶如似我向內似故如言似我無實我所似但似遍計所執妄情現也故言向內不可言向外外無實我故又問云佛不説法如何言似答佛雖無言而得言似共相云何猶如天等為增上緣命於夢中得呪論等意如何謂有有情於天所求呪論天雖無言由有情等心志願故復於夢中而得呪論雖無本質夢中亦得有文義也祕曰答據為緣為緣者佛與衆生為增上緣也祕曰一云十二分教是成滿聖之所引生者意云此十二分教由滿聖之所引也問望本意云聲名成所引云何今言十二分教名成所引答夫十二分教皆必依聲聲若無時教如何有故説教時亦有聲也聲與第二解何別答如第一解但説十二分教是聖之所引示為有情宣説若第二解元由聖者心中作如是安立然後依聲施設名教謂諸有情説種種之法故有別也祕曰二云成滿至名成所引者意云成滿聖者是能引施設言教又立道理之所引起名成所引何以故為諸有情故由元心上安立而方能引名句言教聲等祕曰前二義局者意云前二義但約成滿聖者即佛也所以局也今第三解但據成實利樂所起之聲即通也何以然者答不同有學無學但能利樂起聲總名成所引聲故云謂諸聖説問何故第三解唯解諸聖所起利樂之聲名成所引不約前二但解利樂聲説故無過也祕曰若言自分滿至有學者總是外救易知祕曰唯此可通至理不明也者意云此釋也準此救意雖亦何通然有其濫前二義滿聖之滿也或可濫於凡人如世上言此人言此人已滿足故理不明者若言自分名滿者道理不分明也如前濫失祕曰復有疑云至無記法故者意云此薩婆多依自宗難也難云若言善法滿足得菩提者即所説法一向是無記如何修此無記法而得菩提何以故以彼所修法唯是無記故難意如是答如文祕曰及勝自體者指滅身也祕云一云至慧決定者此釋二識決定也問二十唯識言二識決定如何此中云悲慧決定耶答不違據義別故且如二十唯識不答悲慧相應必有識今據而談不相違也祕曰依餘心起者解云曰雖説法心希利養是也祕曰據多分説者多分有決定也或為遠因者意云雖然近惡暫時生善久後知是惡還起不善心所以暫時生善為後不善心云遠因也近善生惡者反前可知也言遠因皆後自他二決定識為遠因也祕曰身有二分者自他身也祕曰隨八時至明八時義此有兩解從隨八時至如法薨是第一解從又解已下第二釋也祕曰解成楚越者意云楚越二國別也安常征討垣相違也祕曰二俱無失至隨墮樂欲者意云此總是答意也且如天帝釋雖是一天有其千號何妨八時而是一法亦得名八時亦得名樂欲耶問曰言一法分二名者未審約何義分出二名答大唐三藏據歷時聲説有八時言歷時聲者有第一歷八轉聲第二歷八時聲即能起文義故云八時轉八時也即是前解也後解依自慕法隨樂欲聞故名樂欲也從又薦福淨三藏已後即後解也又八時者喚般若八會名八時又有二解如演祕引祕曰一頞二言者所謂一字并頞字也意云攝論梵本若有一頞二字前後三藏可墮取一今既梵本唯有一瑟吒更無頞字如何得各取一耶問何廢無性所製之論前後不同者意云無性前後所作論或可言頞字若後作論或可言一瑟吒字前後二本既是不同何妨二箇三藏各一本所計有別問云何性前後所製之論為是一本攝論前後有別為是二論前後有別答但是一本攝論前後所製不同各是有別作如是計祕曰猶如此方至其類實繁者意云此引喻也由如此方作章疏有先造則別後改後前故知一本前後不同也此亦如是祕曰本為標彼造釋論者意云題論本但説造釋者意不言世親也世親是製頌人不是造釋人所以不言不是由文略義缺不標世親此斥前第一解也祕曰又現所題至成唯識論者意云斥前第二解也如前第二解云成唯識名唯釋論稱舉釋師若如是者望其本頌亦復題云成唯識論既本及釋一種題云成唯識論如何但説釋師不言本世親師也故斥第二解祕曰亦少缺甄簡者意云甄由別也簡者別若成唯識唯又論稱即少虧分別意云即如前第二解分別理不盡也祕曰上下亦有者意云非但分為三分諸聖教中亦有分為上下分如樞要説或可有前二分無流通或可有後二分無初分如斯之類實繁也樞要説祕曰第三四句通説三乘者即説疏中策殊勝業者亦通三業也問既云策殊勝業何者為能策答論殊勝業即身語二種為似業若言策殊業即思為業體思為策即起殷淨心是也身語二為所策也祕曰心謂他心至名記心者記謂記別或可云記謂別識然別字者是各別之義此人別識記彼心故祕曰二並依主者意云神之變故記之心故祕曰持業釋者意云釋輪字也若總通説者即是持云業釋神變即輪餘準此若神與變別道即是依主記心亦爾通依主持業二釋也祕曰問三輪如次至因何不次者意云將三輪配屬三通神變謂神境記心謂他心通也教試謂漏盡通如次攝也若從通起三業化即不次神境通起身業化他心通起意業化若漏盡通語業化問因何意語不次耶總問也祕曰答由至故無有失者意云此總答不次所由有二初答三輪三通次第所由第二答從通起化不次所由此則先答次第也由語離過至善悟他心答語輪為他心通也意業至所招漏盡通攝也由斯發語教試有情者屬他心通也斷惡修善屬漏盡通因果相扶者顯語業因得他心果意業同得漏盡果上來總是答三輪三通次第也祕曰又知他心至意業亦然者即第二答從通起化不次所由也又知他心不待於語此説他心通起於意化所由教試於總必藉其言者此即説漏盡通起語化所由也故三輪化三輪業如次者總結也問三輪三通有何別答輪即是通無別通也問何故名輪復得名通耶答據義別也輪者有二義一云流輪不定義自既得此三業輪復亦令他得此三輪故了云不定也又二云推壞義摧壞煩惱也今言通者無擁滯義也非語業因即語為果者意云依通起化不佛者約勝化用行相別説不約因果相扶説意業亦爾故與前不同也問曰何者以語業為因用語為果答即如如前由他心輪發語教試是祕曰遍計至亦名唯識者意云遍計無體不離識之證性名唯識性非非為説於真如性也祕曰言斷於前亦無失者意云無漏依他既名圓成然有漏善法雖非是染斷亦無失祕曰善逝體所生至屬法身此之二釋總是釋善逝體義也言體二義者通依主持業也祕曰慈氏繼佛襲至名彼體生者意云此釋所生義也問曰如前兩義釋善逝今言所言所生依何義而得所生名答二義俱通問云若論持業善逝即體即報化佛能生名慈氏苦等若論善逝之體體是真如真如即與善逝為體然今解亦是報化佛能生慈氏菩薩據義但約持業釋時好彌勒既未成佛但説他報化佛所生也不可以依主釋即許法身體生於慈氏也已又後第二解善逝及體總是一法身故知釋此即是依主望所生即是報化也今此解與前不殊故知但約前解為勝也彌勒即從法身生也餘者易解善逝者善者好也逝者往也既證涅槃出去生死之義也如前二義可通第三解以法身為善逝者其義云何若約真如初出障邊名去也昔時名有垢真如今時無垢真如約此初出障邊説祕曰簡異於昔在名者古者不作此解今時作此解也祕曰佛至隨學者意云隨學者是僧所依學更不言隨學即是僧也祕曰四瀑流者一謂無明三謂欲四謂愛瀑流也祕曰法證淨者謂獨覺三無漏根至學無學法是菩薩二無漏根至緣彼信等總名法證淨問何名法證淨答為證此淨法故名法證淨也問曰如上諸有學法及三根二根諦信等為是有漏是無漏耶答並是無漏如何彼計云有學無學等法是無漏故問曰何言三諦不言道諦耶答道即是智如三無漏根等即是道也且言三諦不言道諦也緣彼信者意説菩薩身中有諸有學法并苦等三諦理及緣三諦理無漏信心並名法證淨也祕曰問何故不許至不説彼有無漏根者意云於中至有二無漏根已來總是問意問云何不許有多菩薩同出世又復云何菩薩有二無漏根問意如是從容但據已下是答意不妨有多菩薩同出今言但有一菩薩者據後身得菩提菩薩説得有二無漏根第三十四念即成佛故三十四念者如菩薩先欲界有漏心斷見道修道八地煩惱唯除非想天一地以難斷故後身欲成道時先觀十六心至第十六斷非想一地見道惑斷了然後依上界根本定起無漏智斷非想一地修道九品惑謂有九無間九解脫道二九成十八兼前十六成三十四念前三十三總是二無漏根第三十四心即是成道也答不是坐道場菩薩雖有衆多菩薩亦不説有二無漏根故但言一菩薩也雖無事和者意衍云夫言事者謂僧事若多僧和合即僧事得成上界天等既非出家和何得有僧事和合故云上界天室無僧事和祕曰理和者約道理説多人有道理名和一人無道理不可和故如上但約小乘説若望大麟角亦是僧寶攝也獨覺有具和根者約有果説也云何若一三十世界唯一出即得三根聲聞者多不得有具知根也祕曰邪定三者意云定者即決定不決定之義今此一段文總問大乘説初瑜伽論明第二約十信等説第三約十住等説雖後不同總依大乘説至下當知不約小乘辨若望小乘五無間業與大乘別小乘無間業者第一煞父第二害母第三殺阿羅漢第四破和僧第五出佛身血此是小乘無間業也然大乘五無間業者依薩遮尼乾子經云所謂起大邪見撥無因果故佛法僧等廣如彼説今不依小乘也望意不取依十信十住等解但依前解者即瑜伽是也祕曰又案佛地論至現益名義者意云説現益者即是樂也問曰既云樂何故名現義答義者即道理義理也於現有如是宗義理故所以名義也祕曰合為五對者即以十利束為五對也祕曰論中初對二義合釋者意云論中者即瑜伽論三十五六也二義者合釋者意云利差別對中有純共二利二利之中一一皆有二義且純利中二義者一即純自利二即利他然共利中二義者一即自利共他共自雖有二即利他失自雖有四義合而之總為二義故云論中初對二義合釋也餘依彼論次第明者意説除對已外餘四對依彼論明也祕曰逮物者逮由及也物者即有情也祕曰智以絶等至而共他者意顯菩薩悲智雙運也除却如何純自利純利他但反前自利共他即是也問曰若反前自利共他即名利他共自有何差別答但約前後回亦説亦無別義初先約自利後約利他今先約利他後約自利故曰他利共自也祕曰三利益種類利者何名利益種類利益謂利多種有情不同名種類利問如前所説利樂亦利多種有情如何不得名利益種類利那答雖然皆能利益多種行與不行有差別所以有別也如何得知如次言自他一種行一法故自他行同名為種類此一解或可此利益中有五種不同名種類利也祕曰顯非一相似者意云非一者顯有多種相似者一釋門故云同一種類祕曰無染汙樂者意云樂有多種有染有淨染者所謂飲酒樂受名無染汙樂或衆樂具謂飲食衣服等名相應樂遂五欲等樂今菩薩教化欲斷此染得與善樂具緣此樂名樂具即樂家之具也或住定樂者謂引得定諸根調暢名樂也祕曰或有此世能為利益至俱為利益者約衆多菩薩説故故他世非此世也祕曰俱非利益者問曰菩薩行行無有暫停云何説言俱非利益菩薩耶答要待有緣既未熟利益俱非何爽問云何此世他世答世通三種一剎那三世二謂一期三世三過現未三世世既多種種不同不似唯説大三世通諸世也又解云俱非利者但謂對前三句故來未必須依第四句也或可此世他世善法即菩薩利益諸惡不善法菩薩二世俱不利益亦無違也祕曰所有涅槃者即菩薩所證涅槃也及得涅槃至分法者意云亦得涅槃家世間涅槃之分法意不説更得涅槃分者因也即涅槃之因也即是世間善出世間善也祕曰少疾者意云少有疾病故名大力苦有疾者即無力故祕曰勤定一分者謂修慧時亦有勤定修或忍時亦有勤定故分處別也祕曰以如玉理者即正道理也工巧處者所謂修造諸功德等也所生善業是自利也又先造可愛善業今現功受用彼業之異熟果亦名自利也如諸菩薩現法自利者意説所化有情若得利益時亦如現在菩薩所得利益相似也祕曰若於欲界至亦復如是者意説他世利也如諸菩薩先在欲界修清淨業為因未來咸得陀他世財寶自體等果亦能自利他乃至諸界聖者亦然不似須當處終當世也祕曰獲得一切世間善法者意云謂菩薩斷一切煩惱得八聖道支名自利即此八道聖為因而能教化一切有情皆今獲得世間善法不可發初得無漏也菩薩亦得如是世間善法也祕曰世間清淨若因若果者意云如上財寶及體即是其無記因即是善若世間清淨因果俱是善即是世間有漏善法也皆報利益祕曰體即曰斷如疏所引者所謂根境樂相應觸受心等樂所發業祕曰樂所發業者意云為求當來樂果而起於業名樂所發業何以故因此善業而得樂故如下斷意取此名樂所發業不取相應思所發業名樂所發業也祕曰故瑜伽云若諸所有現法至名因果者現法即現世別報果也當果者即當來可愛果也其業者即是通三果之業也後後現法未愛之果者亦唯前解亦業通二果之業也祕曰不爾云何言通三界者意云若爾不用於受為樂體者如何説言樂受通於三耶意云非唯受中樂者意云不是唯取遍計受數名樂受故知更有餘法法者即喜捨也問若不唯取樂受者如何云樂者性耶答為簡異於因樂及後在對治樂等但言樂受為體其實通餘相應捨等也然非想天捨受者即是遍行中受數收問所言捨受亦名樂受者未知何識捨受為樂受耶答但諸識相應捨受有調暢義即名樂受也不須別配文云不取七八識捨受以無記故前六識捨受耳通通三性故故善性收也問非想天可有前五識耶答通前諸地起祕曰樂為體者云漪者水波澄息之貌今定名者從喻為名也意取定中樂受為體也祕曰若順樂受根境所生者意云根境所生得樂受名樂受以能順生樂受想名樂受也祕曰受等不行者意云捨受斷故名受斷故名受斷樂祕曰名勝義苦者意云非想一地捨受名勝義苦問捨受既是微細何故苦耶答對前粗動受等名勝義對無法名苦是有漏故祕曰據遠加行者意云此欲入滅定先猒捨受緣是有漏故須先猒得遠加行名臨入定時即滅無漏心心所法名近加行也祕云出家等曰者意云無惱害樂中分出曰樂第一出離樂者謂出家也今舉出家等後曰樂總得名無惱害樂離此惱害等故不是説有四種人也但説其樂故後之現未等之果之業者亦唯前解亦業通二果收也祕曰異熟果者意云先辨異熟果後辨異熟因也祕曰以信戒為體者意此出離者即出家所得樂故以信戒為體祕曰或總五支者意云謂初禪有五支總以為體五支者謂喜捨樂尋伺支以心一境性名五支寂靜樂者至隨應為體者意云第二禪寂靜樂者即以二禪四支為體若三禪即以五支為體至四禪即以四支為體撿法數諸禪樂體各多少不同故言隨應或唯喜樂隨應為體者意云諸禪各各唯以喜樂為體如諸禪不同故言隨應問曰禪有樂即不得寂靜名何故第二禪樂而得寂靜名耶答初有尋伺即不得名寂靜第二禪無尋伺故得寂靜名祕曰如次信戒總以禪支為體者意云如上三種樂初樂以信戒為體遠離樂及寂靜樂總以禪支為體也祕曰疏配後二至不爾違論者意云且如瑜伽論中有四種樂即如此中四名是也若望疏家後二為涅槃菩提所以疏家不依瑜伽論立後二名但取婆沙意不取即違論者若依瑜伽論即違瑜伽論也以伽論中無後二名故問出離等四樂既是瑜伽論中説如何疏家依婆沙配後二樂答出離等四樂婆沙亦有祕曰問前三如何至名無惱害樂者意云前三是覺法樂之因或能行覺法等樂或能隨順覺法性樂依瑜伽論前三亦得名無惱害樂也問第四樂得名無惱害樂不答覺法樂者即是菩提當體即名無害樂所以不説第四但説前三名無惱害樂今約因果而論所以前三名無惱害樂第四果也祕曰第三云者意云引論證第三護法義祕曰今於唯識深妙理中得如實解者此難崇福法師不許護法師生真智今約護深文亦通生真智如言深妙理者豈此理唯發世俗智妙理即勝義中道道理故知亦生真智也祕曰又知識至亦何爽理者此難計大辨論師不許有俗智如論言了俗已然後證真今大辨既得真智何為不得俗智耶於唯識相如實知者即俗智也於理如實知即真智也祕曰此上即是發端等也者意云將解此字有其四釋且第一一云上字提也合是者字意説即此字當體者發端等四也第二云此字句上字皆是發端等四也雖發端下不言等計合有也意云何故但言皆是發端不言發端等耶答此與上字皆有發端等四也所以存略不言等但言發端也若望本意唯明此字緣上字是此字之流類故上字亦有發端等四也所以兼明上字也此解不好三云今造等言者意説此上二字皆有發端等四也意明今造二字不明此字以今造二字此字上故所以云此上問何故第二解但言發端今第三解但言標舉等如何二義不同答但回亦舉更無義義也祕曰今造此論至發端等也者是第四解意云此一句論論總是發端等四如何得知答以今造此三字如上別明訖所以今第四解總指云此上即發端等也問疏家若言論字釋即無妨疏但言此上發端等何得意句之言總是發端等耶答説此之言即是端論故得總指也祕曰猶理差可者意云若作此解少有道理也故云差可如世間人人差可如此不可如彼也祕曰迷執明理者意云若衆生執空應將有破於空執而顯於有理耶答演祕説祕曰即答前難有不盡失者意云望本難意衆生執空即為説有既中有教空相即除空相既除有應顯理本難意如是有有若也執空亦為説有雖為説有而不顯理若如是答者即有答前難不盡失既不顯理何用説有耶故故不盡也祕曰有義故名為重者意云釋貪等亦名重所以問二執是根本沉下説為重貪等與執理相應非沉下故不名重答二執據沈下二執得名重相應貪等能行果與昔為依亦名重義不違也祕曰害伴等者我見是主隨眠是伴即伴彼故名害伴所以喚隨眠名害伴也祕曰但斷少分者意説第四地中斷第六識中法執少分貪等餘害伴障等至五六二地方名不行華嚴經第七説菩提分法觀第七地方名不行已上是崇稱法所解已下是演祕家難并會華嚴經也祕曰以第四地中至更思者意云會前所破第四地菩薩初學二乘菩提分法觀何故須學以欲化他須遍知故五六兩地由於彼者第五地學二乘四諦觀六地學獨覺十二緣生觀故言由教於彼未能超過二乘至第七地菩薩所修學觀等即超彼二乘故名為最勝不是第四地中斷法執種不盡至七地中斷盡名最勝也故知第四地中令斷種也其法執家害伴隨眠亦第四地斷以斷種故不同故執也問菩薩初證有百法明門至四地中功德彌廣豈謂不知小果可須學耶答為欲化他故示現學非為不知祕曰總四句答第二問者意云非但四句答第二問亦得將四句答第一句如演祕自作法易知祕曰問若是護法至為等流耶者意云此總是問護法之意也就中有兩問一問云智障數同煩惱亦有一百二十八種執障後別何故但忌執云無品類耶第一同也執障後別者五識但有障而非執六七識障執俱有執則染慧障即貪等故執障別也第二問云意識亦有是障而非是執者謂有異熟生無記貪等心心所法但是障非執何故答中但云五識有愛恚等不言第六識耶如下舉祕答先答第一問後答第二問祕曰所障至無品類者答第一問祕曰答中既云五識至言識中愛等者答第二問祕曰問即無違者此約問安慧師也問即無違者疏問云煩惱有品類可言根盡莖葉除如所知障執既無品類何得言根盡莖葉亦盡此是問意不違安慧家故言無違以安慧法執與障無差別故答亦有過者如疏中答云六識等中法愛恚等有差別是法執之等流故言有過也以問中無差別然答中有差別故言答中有過今安慧所通言亦無過障即是執無差別故言有本末者但約諸識執有淺深義分本末不道實有本末品類等差別也此是安慧解更有異解如樞要記祕曰有義至無記心等故者意云今安慧師執與障相望得有兩句一句云但障皆執二句有執非障者所謂善無記心等問善無記心等何得是執不是障耶答安慧三性心中皆有法執所以得名執謂非是不善心第不得名障交障者必是不善障於善故知善等不得是障總是初義即下第二句為初也復云執障至皆名執故者是第二義也即配初但障皆執即是後文如下破初後二義準此配也祕曰初義至不覆理耶者此即斥初義也意云夫論執者於境堅蔽不了是虗取相不捨存既有相即中道難明覆蔽於真亦名為障何得是執而非障耶祕曰後義有濫者意斥後義也若言有漏障皆名執者即此言有濫如何得知如佛地論云障所發業乃至皆名為障未必名執且如色果等豈有執耶祕曰一但執皆障至有二分故謂業果中有是心心所者有非心等者是心心所者且業有似業謂身語等是也無見相二分故今不取但取是心心所者有見相二分果中亦有總別報但取別報心心所者有二分故如是心心所皆是執皆障二但障非執者即取業果中不是心心所者謂色等無相見二分故但可言障而非是執也二分者謂相見二分色即無二分心心所法有二分也今復佛地論障及業果而為二句一但障皆執謂障自性及業果中取心心所法一分如何名一分答且如業中有色業有非色業者色業謂身語二業是色似業身語非應思為實業體不名色也取一分者意云取心心所者有見相二分果中亦爾謂別報果如何得知答業果中有二分故別報果中即心心所有見相二分故色果中即無二但障非執即業果中非心心所者但取業中身語果中色果不取心心所法為果者祕曰修禪定時受為勝障者意云謂此受之勝用也安慧相見皆遍計故此解是餘解者非也祕曰此對等覺二乘解脫者意云勝果者對等覺菩薩及二乘解脫以立勝果名等覺二乘者於佛故祕曰名為等覺依長時説者意云一剎那間二智與佛平等雖然一剎那間與佛平等約長時説不及於佛佛已成道未或經多劫以望長説故所以菩薩不名勝菩提據佛成道多時名長時祕曰無間解脫至等者意云計合無間斷障解脫證果即名佛故何故今言同斷一障耶答據實解脫道已斷合是佛約離障邊亦名斷障其實已斷也問證二勝果時二障並除何故言但斷一障耶答障雖有多類同是障故同障一佛果故所以總言一障不以言一障即更無餘者此三藏解也言三三映者即三解脫門謂空無間等也祕曰現正等覺是一切智者意云即正體智問云何名一切智耶以真如遍一切故斷惑所證真如智亦得名一切智極善通達是道相智者即釋正智之所以也現等別覺是一切智者意云配後得智現者現在等者等取現在別類諸法智悉能了名一切相智或可通説過未來也智能了故祕曰一切煩惱皆能續生等者意云有二解一一通一切煩惱雖後總現行亦有不發業者雖不發業亦為遠助同者總是不取種子或可通取也據父顯不取為正異身生目者異身即現在身邊望當生身為異乃至展轉為例可然祕曰或據起現名為全界者意云但取潤現行名全界雖有慢等現行若不潤生門不取也前父助業感雖不潤以現行亦名為全界又疑也祕曰一分斷者俱生煩惱有一分障事觀不令有情得於諸定今能伏已故言一分彼分涅槃即寂靜義也與佛法真如寂靜相似言非決定者非決定欲斷也祕曰若宗法言決定非無故無過者意云若宗言實有即將忿等瓶等為過何以故以是似故今宗言非無即無前過何以故以瓶等忿等雖是似然是非無性故祕曰因亦決定相違過者意云即與他因作決定相違過失決定相違過者唯先陳有法不改然宗因喻三總改一一對前可知祕曰無色至無身者説意處諸心非是色法不可見故名無身也謂於色根名於窟祕曰豈自矜𭿺矟者意云此顯相違也如何相違答如有人持矝行有人問云用此何為答云此𭿺堅硬而能御賊刀鏘不及人萬物不敵又復擎矟行矟者榜也如有問云此物何用亦準前答豈不前後自相違耶祕曰全無分無總名為無者意云全無心所亦名無所分無心所亦名無所但有三無多故名分無如何少水亦名無水也論故作斯論主亦影顯者意云三師皆有今造此論皆有故作斯論不能繁舉故亦影顯也祕曰三十頌中中各攝幾者意云汝若將三分成立唯識者未審見等三分一一分於三十頌中各攝得幾頌耶焉有矣者意云是何有義作如是説者何有如是道理祕曰攝論立宗明十殊勝者如法數具到祕曰斯之二論至唯境行果者意云即瑜伽論正宗明境行果三今唯識亦準彼正宗明境行果三為正巧宗也祕曰又云本智至見道名神者意云見道中無分別智緣如名法心與境世第一法名智見道名神即從加行道至見道故名智與會也神是智上用至見道中智用漸增也祕曰按彼經四百九十八云乃至名為也間者意云依大般若經説大波羅蜜為世間即舍利子問今演祕家引來故須一一別釋也第一是世間者是有漏六波羅蜜體也造世間者即造修六度也由世間者由有身修六度等世間者為當來果修六度等從世間者從自身修六度等屬世間者此有漏心六度未出世間故名為屬依世間者依此六度而修習也呼世間者名為世間即是呼也疏云名為世間者即是呼聲也祕曰出世間者即無漏六度等也亦依八轉聲釋其義可解祕曰名出世者名者即是八呼聲也祕曰題卷亦誤者是般若四百九十八説疏云五百卷説者誤也祕曰如諸花經云來入此宅者意云如法清先居三界如何更云來入此宅但約以後業果微增而説也此亦如是祕曰有義至亦無者意問云且如我法體是無所執相見後是無如何聖教將無依無無以依見相計我法故祕曰世間所説至皆名執者意云世間有漏及聖教菩薩二乘一分有漏心所表現我法者此以無依無有漏心心所皆是執故若諸菩薩等無漏及佛現者皆強施設即當義依於體似佛菩薩無漏心上有軌持一常之義名有我法有情皆似施設也祕云若無漏心至皆依自證似説者意云安慧師二分皆是遍計所執此約有情相見説也今約無漏自證分説問何故不約相見二分説答無漏心無見相分也言分別説有能所變者意云自證分是能變我法是所變故知説變言不知唯依見相分立祕曰且依第一義説者意云即次前二釋中取第一解祕曰相見後非我法所依者意云若將我法為自證分之所變者即見相不得與我法為依也故知此言唯詮相見是識所變不言此我法即識所變也但依相見分上似立故祕曰然濫第七者意云若約別云緣境名了別境識者即濫第七識何以第七識亦別緣第八識為境故亦應得名了別境識祕曰二三至亦無八別者意云雖初真即是第二俗若望俗諦説過有八別若聖初真亦八別何以故真勝俗故祕合作二文科者從論曰至亦勝義有已來總分二段第一段者從論曰至實有境者別解三句第二段者從愚立所計已下至亦勝義有者通前總解三句此論文總分二段名合作二文科祕曰有義至緣用必依實有體故者意云無法本質不能生解如有人計無法無法能生解者約本質説其實無法影像能生解也故引瑜伽云但説緣用必依實有體法不説無體法能生解也故知無法不得名軌不能生物解故祕曰答據生識體至疏等之意者意云若生識體必須有體法為緣若但生識行解無法亦能為緣發生行解也如立我無故我無之言亦生行解行解者即識之用也祕曰十三住至不説餘類者意云詞授是我別號即局然十三住等通今者但取十三住通多種名我種種相不取詞授之局名也祕曰二句不定有二解且第一云唯取第二果向也超越次第有差別故者此釋不定義也次第向者即從初果已知前欲界修惑九品中斷前五品及所起四道耶加行無間解脫勝進及第六品四道中前加行無間二道物名第二向也若至第六品解脫勝進道即正第二果也此總是次第云二向也若超越第二向者謂有利根者於加行道中以有漏知六行伏欲界修惑中前五品入見道時與見惑一時同斷名第二向此即是超越向也問何名不定答或有次第向或有超越向有二向故云不定從聖順決釋分者即加行道智也意云加行道及見道十五心總名向祕曰第二加前者意云依第二解有兩種向第二句不定加前第一解是也祕曰第一向者至有差別故者意云此解第一果向亦有超越次第二種得不定名次第向者但斷見道惑至第十五心已來總名為向若至第十六心即正果攝故此是次第向也超越向者謂此人利根先出世間道伏惑修三四品至見道前十五心已來亦名為向也雖斷修三四品亦名初果向也至第十六心即正初果攝問超越第一向與漸次第二向有何差別耶答此超越第一向於見道前先伏修三四品至見道十五心已來與見惑同斷立初果向若次第向從果已後斷五品已來方立第二向取有差別也問第一超越向與第二超越向有何差別耶答雖一種超越但第二品先伏不依有差別故若利根者即修五品立第二向斷修三四品至十五心已來立第一向雖有此解疑滯仍存何故一種超越之人而有二向差別豈第一向超越之人斷前三四品修惑不得名第二向要須斷五品念第二向耶答雖有此理本由加行心別故所趣有異立二向何爽雖有此解理教若不是分明由此故知下斷不取第二解但即二解也祕曰第二可通者意云依修惑斷不斷別立初果向斷第二第二可通者若依此説即第二解可通也若欲界理教分明行相全殊別者即不及前解也問何故不説第三向耶然有次第超越者放答少故不説依演祕家亦許説也祕曰崇聚生因等者意云崇者高崇即是蘊積之義祕曰即能生長彼作用義者意云此根處能生彼心心作用也若無其根心心所法作用不生也祕曰如一山中有多銅鐵至十八界意云此即舉喻以同大界已如一山中有多銅鐵金銀者要由先有銅等種族銅等可有若先無種族即銅等不有今時身中十八界亦爾要由先有同類因即有十八界若無同類因即無其十八界何名同類因答如前念眼疾引後念根眼即前念根是同類因也眼等既爾餘根亦然界者即是種族義問種族是何義答種族者是生本義問如何名生本義答本者根處也今此界能生後念根故云説界是生本義也祕曰如是眼等至謂同類因者意云證界能生根也界者即前同類因根者即後念根也故説界是生義也即界者能生者能生心心所法界故名為義也今依此解明知界與根有差別祕曰餘三善巧者意云善巧有十種論家對蘊等者等取七介依待家但對根諦等四帖論中三總合有七取後三不對故定餘立問餘三善巧者是何答餘三者即是乘及有為無為是也下頌云依此作法祕曰或四善巧者意云此據七善巧辨論中有蘊等者等取待中根諦等四個故云或四也若據其善巧名字待家總有今言餘三或四者皆是回心説也祕曰得能造名者意説所造能得造名也祕曰答但無服至能所緣用者意云無相由識生亦是識上能所緣用亦是識親取故由此多義故相見不同心心所也不可為側見是識云用相是用親故祕曰説別種者至同種類者意云設許見相各各別有種子亦是識變何以故且云見相同經家之依類也祕曰復是識用親所取故者意云見分亦亦自證分上用也親所取者即相分是見分親所取故四分分中不許自泛隔見緣相也祕曰據第七至名通三性者意云由第七識相應無明根本故前六識無明方得增長與能為緣發生三性心心所法又由第七識無明前六識轉不收是故説無明支通三性也祕曰隨有辨十二緣生宗説至故通三性者意云薩婆多師約分從如無明處中所有一切五蘊諸蘊皆名無明支何以故住無明支分位故餘支亦然故説無明支通三性也祕曰法執至通三性者意云法執與無明為地即三性心中間皆有執由此三性心中執為緣故所以無明亦通三性此依安慧師以以解也護法不許善心等而有執也祕曰第七無相至身名支故者意云若第七無相通三性名無明支者豈第七無明能發總別報業耶夫論發總別報業方得名無明支第七無明既不能發總別業如何得無明支名耶故知非也祕曰若善等俱即行支故者意云汝若言有崇無明位中五蘊通三性所以無明支通三性者不爾若言無明支位五蘊通三性者與善惡性俱時即是行支故何得牙名無明支耶故知非也祕曰參人不簡者意云餘人將第七識無明為支體今時法行將第七無明為遠緣起六識無明無明方能發業乃名為支業第七無明為支據遠緣故餘人不簡而有異也祕曰今據根本唯説我釋者意云謂此能頗知根等見覺知事所以説我名為我能釋不説我體與有見也計思為我也祕曰通能計所計者即是三分也見施設處者謂意云能見計分於所相分上與施設我法故説見分是能施設相分是施説之處也如於殿宇施設道場殿宇即是所施設家人等是能施設者今言我法依二分施設意在於此汝曰能遍計至所執性者意云於能所遍計二分上施設所執我法性故祕曰是是能緣似所執故者意云若不計我為能緣即可唯依相分上施設我法設許計我為能緣何不依見分上計我法耶何以故見分是能緣似所於故意説見是能緣似妄所執實我相現也由此道理亦今依緣見分上施設我法好也祕曰若唯依相至全不相似者意云若許唯依相分上執為我是依緣者不能何以故以相分與能緣我今不相似夫言相分皆不能緣由此故依見説計我為緣道理分明雖第八識是第七識相分且不能緣夫識上所變相分皆不能緣也祕曰攝論唯二義者意云即相分見分名為二義世言無有義者意云唯有識有無境義也下言義者亦準此釋祕曰二識別故者意云相見二分名為二識即相分不離緣故亦名識也見分名識其理極成祕曰見分所變似能取相者意云如意識緣俱時眼識令名能取意識名即意識見分同時反能取眼識之時即能取眼識亦相分收所以唯依相分上執我法也第七緣第八識見分亦然祕曰一云相似如侍所辨者意云且如自證變起見相分生道理矣如何更置似言答言轉似二分者説自執上二分似妄情所計實見相二分故説似言不道自證似於見相但説見相似於遍計所執二分也如何言相似答遍計二分雖實無體然通妄執實能所取解以能所取相似故名相似也祕曰若以堅執主護法何別者意云自證真變為依他二分似自證分若執此二分實者方是遍計所執其體是無者即與護法何別護法亦説若執見相實有者亦是遍計故言於見相堅執萬無體者與護法何別祕曰能計皆自執分者意云此能所計者不是遍計所執計但是分別思惟亦為計也祕曰無依於有有體強設二種似者意云無者我法有者自執有體者自證強設者我法雖自證不是我法與於自體強施設我法也若約依他體上計我法者即護法安慧俱有此於似我也若安慧於遍計所執二分法我法者即不得此名以見相無體故祕曰此與本疏第二説者名別意同者意此疏中安慧兩説中第二説同也祕曰德者大德即猶宗論法師祕曰親奉指誨者基法師親豫翻譯執筆綴文豈不知安慧宗依遍計二分上立我法豈不知自證緣於無師故知疏斷取前解也祕曰豈未學同年語哉者意云崇福法師是基法師學士故言未學同年者意云既是未豈得共他法師同時爭名耶祕曰亦猶三傳至與丘明騁駕者意云三傳者即是左傳但是一部元是孔夫子説公良谷二人注也本雖是一隨三人説名三傳演經者即是公良二人注釋傳也餘公良等二人是孔夫子之學士豈可與孔丘明而齊年名師豈可孔夫子非餘二人是耶祕曰問安慧宗至皆有二分耶者意云安慧宗計能取所取即是所緣若能緣識執此能取所取為實有者方是見相二分其體是無非一切心而皆緣二取也既不緣二取者云何識皆有二分耶不計二取為實故復云何得有二分生耶問意如是祕曰答有義至有差別意云此有義略將安慧師義答前師問也答云凡隨所計度境未必與心俱由此故知總説諸心緣境差別有其四句第一句云五八識雖有相未必有見餘句可知然第六識雖俱有二分然相見二分未必俱心此即説諸心緣境俱不俱差別此總敘答意也祕曰答問不遣者作等是答者不遣其問也祕曰復彼非至指當者意云此即不當他本問意問意若如安慧師能緣識要緣所緣能所執實方名遍計所執二分者其中有識不緣二取者如何得有二分耶問意如是今住將緣境俱不俱差別答前所問如何相當耶故云非至當也祕曰不説至斯為不遣者意云他家本問二分生之因由今住不答二分生由但説相而見俱不俱差別如何迷得他前同故云此為不遣祕曰今又釋云至後二分起者意云此演祕家釋也且於隨一者有漏識變起持皆有能所緣二分闕一不可未有見分起時而無相分故得隨一起識二分俱生而不可如安慧性先有所緣見相然後方有後二分生能所緣見相是所緣執此能所取見相實有方是遍計所執二分名為後二分生也祕曰答安慧至不可定量者意云安慧只合離舉本與釋共為一部未必説眼等為現量即是定量也故今不緣祕曰應言望執至現者意云雖皆有執執輕者名現量若執重者名非現量又解云安慧計夫有漏八識皆是法執若準此義即皆現量祕曰如勝義世俗善者意云若無漏名勝義善若有漏名世俗善相瓶立故此亦是或可世俗善對遍計等名善對無漏勝義善法亦得名不善也祕曰此據初義思可知者意云安慧師云見相二分是計所執我法又無即是物無依別無也祕曰殊勝説者意云若一向於為非實者但約殊勝義説説唯識界勝義相分非實也故知不依四勝義説若依四勝義説者但相瓶名勝義不約殊勝義説也今約殊勝故不同前祕曰據離蘊至在法因分者意云計我遍常常相以無體故所以法同分收若是識所變青等之相似有體故不向法同分中收隨心所心王是四蘊攝也故二種相別也雖一種是相謂有體無體別故又更解云六識所變相無有多瓶體差別但一種是相分收離識無體所心一種同是法同分收雖有二解道理而言前解為勝祕曰伏犧者蛇身牛首蛇身者此人身有蛇鱗牛首者即身有牛頭也即古時天子也然書中説伏犧者具有三種一者伏犧二者密羲三者庖羲云何名伏犧伏者即是降伏義也能伏一切諸獸故故名伏也何名為羲羲者牲能伏得伏羲名伏羲即若密羲者密者即是謂此伏羲能行細密也行故名密羲密羲者即結密細細蟲鳥等名伏羲者即君號也何名庖羲庖者厨也能令厨中易生置熟人等食也緣此義故得庖羲名也問夫言羲也者有三種謂日光名曦謂羲姓名羲第三羲者罕也既有三種羲何故不用第一第二而用第三羲字耶答餘二羲字各別屬事唯有第三羲字該通多種種如何緣伏羲未出已前人等答各居其穴庾居其單未有宅室緣伏羲出已方故造宅室伏羲未出已前未有書契但以結繩為信伏羲生已應有書契伏羲未至一切諸獸人不能伏得緣伏羲生已而能降伏一切諸獸而能伏牛乘馬引重置遠緣此多能得伏羲者即義下著秀名義問何故偏用此義下著秀義字答義者亦云實也以去華就實名為秀今此伏義者其浮華存其就實之行所以伏義之名但用此義字不用餘二曦字問言伏義者為當是名為當是性耶答並非名姓但以能伏獸等得名伏羲伏義本姓風名人故號為風人年前以姓彰名今時人姓外別立名也如詩家取牛色犧字者但據伏姓獸義名伏曦也祕曰論指常空而以為喻者意云準論師空有二種一者常空二者無常空今論指常空為喻故無喻中能立不成過也祕曰先成空常者意汝若言空是無常即喻中有過者今先成立空為常然後方何多我為同喻也祕曰泛爾常遍者若論泛爾説常遍之言即亦許若論執我為常遍者大乘不許祕曰有云而置執言者意云能執字者有解因明者共許於因喻上而有執字也祕曰全成虗搆者意云論有執言疏有許字二義是同所以論中但有執字不著許字也何須解因明者共許因喻上與有執言耶如此解者但虗稱朴令無道理也祕曰大小量等者意云如一眼根與有七極微此等極微更亦相望大小量等不是能造所造所造亦相望名為量等但能造所造七極微各各自然相望名等也問何故不轉能造所造各各相對亦相望耶答不爾大小不同能造名極微所造名微大小有異不得名異等所以但約能所造自相望説也意云説能造地大七極微自望所造等立一一極微自相望也祕曰能造地大者意云眼等六物名所造唯地大一個名能造問大眼根者皆用清淨四大於所造何故唯説地大不説餘三大耶答據理亦今説餘三大種然地大成眼根等相最顯故所以偏説也又準瑜伽論云如五根亦有一大造二大造乃至三四大造得未來必一根皆具四大也祕曰七個極微同一處者意云眼等七物各各別別有極微而同一處住故言七個極微一處也祕曰通能造六者意云一個地大有通能造色等六個功能是以能造唯一所造有六也祕曰不爾所造云何六別者意云若言能造唯有一者如何所造而有六耶祕曰地類同者意云眼等七物還有七個能造地大以地類同故但舉一地大其實有七地大也祕曰如言一眼七極微至據類談者意云眼雖有無量多微造而言有色香等七物者據類談也夫是眼根皆七極微造亦爾者其實有七個地大以地大是同故所以但説一個地也祕曰一根微處七物同住者意云如一眼根用七物成且七物中一眼根微邊亦有七微同住謂自眼根家能造微及餘香等六微故合為七明知色等七物一一皆者七微七七成四十九微故下云以此七微對彼七微也如眼既有七微總香等亦有七微餘者準知故言此七對彼七同一處住名為和也祕曰七七各別者意云即前説七七四十九微各各離即體同住名為雜也祕曰瑜伽論第三云和雜不相離者意云此引證證前義問前顯名第二云相離不相離如何引證乃言和離耶答但名字別義一種也祕曰即此大種極微與餘聚集至也處俱故者意云如地大種望餘香等同色處俱故即喚餘香味等餘物名餘聚集也將香等餘物展轉相望皆得名聚集即能所造也一望餘色等故名餘聚集又若有聚集者即是麻豆名又有聚集也祕曰之所攝持者意云為膠等三法各各皆能持麻等如丸藥等被密攝持又麻之與豆一處麻麻一處不可麻豆和一處也祕曰異大造者麻與豆各別大造祕曰三聚和合者應云蜜及膠沙等三聚各各能持多豆等為一處也祕曰異聚相望故名和合者意云雖同是豆以顆數多故故名異聚即此顆望彼顆也祕曰如即蘊至思我應爾者意云且如外道言即蘊計我者但是佛法談他計我云是即蘊望他外道本計而不立蘊今言我是即蘊者佛法安置也故計我是思者我應行蘊攝故言應爾祕曰望以類別者意云雖一種是同色望有表無表類別故須別破祕曰不可説非我至於龜毛喻而不得轉者意云龜毛是非我今既云不説非我明知於喻上不轉也龜毛則可説為非我今字既不可説非我明知於可説喻上不轉若無不可説字即得轉也以龜毛喻可説為非我故祕曰我應定是蘊者意云總是難詞言我非我體唯實者雖言蘊非我應定是蘊不應是非蘊望他宗計我有非有蘊非如離蘊計我皆是故今離言我應定是蘊不應是非蘊祕曰此破云應是是蘊者意云如是但破我不破非我故答云應定是蘊由我定是蘊故所以但破我非我不是蘊所以不破祕曰如似其我者意云如似我是正計而不計似非我所以非我不是正計而不破也祕曰難令即蘊例意同前者意云將我非即蘊等也例三如言我非我我是正破非我不是者如言蘊非蘊應即蘊應即蘊計我離蘊應不計我祕曰喻有二立何為為正喻者意云二立者即是能立所立也宗為所立喻因為能立要具二立有得為正喻也若二立中隨闕一立皆不得成也祕曰若直準論論中不言不在聚等者意云汝若直取論文為定者且如論中不説我等在我非我聚上如何今立宗云於我聚亦不可説耶雖文中不言不在語似隱意反顯云不可説藏我聚上也故知不可説有為無為雖論一處説今分不可説及有為無為各別説二無妨也祕曰又亦於誰者意云若不取餘者為無為須説又亦之言文既早已説意如何更置又亦之言答如下祕曰若無我見能證涅槃者意云證我見不緣我方能執涅槃也祕曰若是我見境者是設遮者意云外宗我見不緣我如論中云若是我見境者故知設遮也祕曰豈不犯相扶者意云他宗我見不緣我生如論中破方又諸我見不緣實義者豈不犯相符耶問夫言我見皆緣我生得我見名既不緣我生如何名我見耶答我見有二一者淨我見雖緣而不執著二染我見一向緣我而堅執著今言不緣我者據淨我見説或可據彼諸外道亦不許我見緣我也即僧佉不許勝論作者我見緣於實我勝論亦不許僧佉受者我見緣於實我生如是諸計展轉相望皆不許也如言我見不緣實我者據此説也若望當宗無有我見不緣實我生也雖淨我見及亦不許我見緣於實我總染我見一向緣我論據染見破故不相扶之失祕曰據不染見者意云前言無我見能證涅槃者據不染我見説故云無染見不以道無染見無其染行我見也有染我見故問且如不染見者即是淨我見我見既是先淨如何更言離也能證涅槃耶答我見雖淨而不執者總仍緣我得我見緣此道理所以須難淨我見證得涅槃也謂有染我見故所以不執相符也祕曰諸宗計我皆我見緣至是設遮者意云此第二解云諸宗所計犯是我皆我見緣無簡染淨無故知論中云若非我見所緣境者是設遮也祕曰不名我見者意云若前知解云我見有二謂染及淨既喚淨我見名為我見者明知我體亦是淨我見緣如何前之外道我體非我見緣者據淨我見説耶既言我體非我見緣明知障見緣我時不淨我解亦不得名我見也祕曰通於凡聖者意云但契理會實事皆名至教至者實也即至實道理也即世間儒亦是祕曰如八語品者所謂見言見聞言聞覺言覺知言知名四謂不見言不見不聞言不聞不覺言不覺不知言不知四也悟前成八語品四聖言等者意云即語品中取前四即是至教祕曰皆隨法行者意云謂聞法與隨行之故名法隨行此法是善堪可隨行也祕曰有云若言至不緣我故者意云有北川大德解云若言我見不緣我者有相符過也何以故即外宗即不許我見緣於我也故犯相符祕曰違論及疏者意云論疏二家皆説染見彼道許緣我如今言不緣豈不違論疏哉祕曰問若爾自宗至如聲等識者意云敘外難也難云大乘若不許我宗我見緣我者即大乘能所緣義皆不得成先難能緣不成後難所緣不成如又自説祕曰問曰智至何事不齊者意云若言我見緣我非世共許者即不許緣我者正智緣如亦非世間具許了知應亦不緣如道理正齊何方遣難遣難正體智是有法定不緣如宗有所緣故因如後得智喻也必演祕之難準前作者即指此文問他若將彼第七第八為難如何者意云亦是外難難云我見緣我非世具知即不許者且如第七緣第八豈世間皆具許緣耶故難云第七識定不緣第八識有所緣故如眼等識問何故不將餘識難偏將第七八難答前六識世共許唯第七八世不共許故引為難也祕曰彼二論中者即瑜伽顯揚也十六種大外道論有意云此十六種外道論中明我非是相分祕曰故疏無失者意云今但外彼分別俱生二我見不是將示自正義也祕曰稱離引者意云第七相分雖一體然望兩字故雜引也亦通有覆無覆二性名性雜可知也祕曰當地五識所緣質相豈同種者意云若言初禪眼識相分與欲界火不交相似故即引種者豈欲界五識相交同種耶且如五塵交是第八變五識詫他第八質自變為相分豈分與質與得種耶祕曰便疑稱者意云若異地即不稱者豈同地即稱耶故云便疑同地稱祕曰除第六識餘七識變者意設餘七識各各自證分變起相見二分即此二分名五取蘊然第六識及俱生我見詫為本質境後變起自相分為影像相境而異妄作我解問識色蘊可爾餘三蘊如何答餘三蘊既是心所法亦各各自證分變起見相二分也如論言緣識所變五取蘊相者即第六識所變五取蘊為本質然此我見詫此蘊為質境起自相分也又準西明疏解云五取蘊者通攝八識問五塵相分種子五識能至一如本質種子唯識能至一耶答第六重一相見二分今時我見詫為質頂也問何故名可變答八識見相分皆是八識結變自執分之所變起也結變相行三蘊亦隨識説以皆名有自執分故祕曰若是本質如何但説緣識所變者意云第六識中俱生我見既緣五取蘊本質起者如何今言緣識所變耶此即疏緣也答理亦能變之識者意云雖説我執緣蘊本質理實亦同餘能變之識也如何因耶答要由餘七識變起五取蘊已然彼我執等方託蘊為本質而能為我也亦猶如第八識變起五塵五塵本質與五識為疏所緣緣自所變相為親所緣緣此等爾祕曰説所變言依相見故者意云執我雖緣本質不緣識所變相説所變者依相見對説其質不緣識所變相也有見分時必有相分既言緣五取蘊必有見分不獨法託境方生故有相分依此道理説前變言權實我執計五取蘊本質以為我也理實親緣唯所立相者意云如上言緣質約疏緣説若約親緣唯所變相分也祕曰若依質説亦緣結變者意云五取蘊中四蘊本質當體是結緣今言識執緣蘊質者即是緣結變識等也亦如第七緣第八八質即結變故第七亦緣結變也祕曰此隨相顯説所變者意云據實緣質説所變言據相顯處説也祕曰實亦不應言識所變者意云據相顯説所變言其實但緣本質不緣識所變問五取蘊既由餘七識所變然彼我執方緣之何言不緣法所變耶答餘七識所變五取蘊等本質即緣若餘七識上所變蘊等影像相分即不緣如上言不緣識所變者皆準此知祕曰不爾前執應説變言者意云若我執緣所變相者何故第七緣第八時不説變言但言緣第八識起自心相耶故知約本質説不緣識所變相也祕曰頓悟亦天道前者意云但説起初二果立頓名不以有頓悟之名即説將是菩薩也祕曰如何説起果見道行者問云且有義家許有超果人不答據少乘許大乘不許故下會之對法論云説起果者據小乘説問有不家許有獨頭貪等伴不合雖然許有害伴獨頭貪等今難疏意一向約於應貪伴難不約獨貪伴難祕曰欲界煩惱至而可云何先者意云我見及相應貪等雖有漏六行世道不伏謂伏獨頭貪等所以見道時亦斷欲界我見等九品煩惱得第三果也問貪等既不與我見相應云何名伴耶答雖獨頭貪不與我見俱起以鄰次起疏相資助亦約伴侶由此世道伏故所以至見道時我見便斷也問我見微細而煩惱為依行相既強非小時能斷如何在凡凡位而頓得第三果耶答世有有情利鈍令利根姓差異萬品不同有間能成大果那含小聖何何為疑謂此利根既以於六行道伏猶獨頭貪等及餘八品俱生煩惱與不今生我見行相輕微所以見道同斷執第三果也祕曰又言伴者相助者意云如有義家之我見之伴即貪等相應果道既微云何能伏故知大乘為超果者今解之言伴者但疏助相名伴非要須相應所以有漏道但伏獨頭貪等伴也故言伴者相助也祕曰要相應者至害伴故者意云難前師也若言我見伴要須相應貪等而無獨頭貪等伴者云何五地説斷害伴隨眼既云五地劣害伴隨眼明知許有獨頭貪等為我見伴為地不許獨頭貪等為我見伴故為此難也祕曰不説相應之貪名伴已伏者意云及顯獨貪等世道能伏名伴已伏祕曰此論明言不故違者意云若言名許斷欲界第六識中我見煩惱等者即合生上却即下惑論文既言而無生上却斷下惑明知起果人見道行我見等而執第三果生上界也祕曰亦不可以未非或倒至障不意云此際故重破也外救云如那含人雖生上界仍第七末那中或不同生不障果故不須斷第六惑中能同生以障果故須斷祕曰又復論至以自簡説者論説當撿彼文祕曰造毗數論者意云謂僧佉外道先時造數論不為廣釋今七十論中方始一廣解故云略也祕曰據實成根唯量者意云依疏家有二説一云五廣成五大五成五根此即展轉相成説也二云五唯總成大等總成五根據此五根之因唯是五唯也故云能成根者唯是五唯由斯十六諦唯變易收即大等不成他不不得名本也祕曰若將別人至故名無喻者意云若將德為因別人為喻上無所立所以故以宗是假喻俱實即似宗於喻上不轉故名所立不成若以三德為因軍林為同喻即喻闕能立之過因即是實喻乃是假即因於喻上不轉故喻闕無能立過祕曰彼以大等至亦準此者意云且如大能成於色色是現量明知大等亦是現量所以根等得色之時也得於大等以大成於色故色既是現量明知大等亦是現量得然我成於色等根得時既是現量明知我執亦是現量得也故言亦準此知祕曰以生滅名為常者意云俱據不滅壞故名常本計還是轉變無常也祕曰汝宗第八品月此過者意云第八體是一不妨變為山非山等別何妨我家三德體遍常與能造多差別法耶祕曰有云三對有六量者意云此師於此一段疏文總分為三對其立六量以破他宗也若依此説道理不盡也祕曰稚年貌美意云此婆羅門小字作儒童豈對大時即不喚為儒童耶此間亦有人小時字作阿小豈至老時即不名約少耶故知婆羅門雖稍年邁不妨亦號為儒童也祕曰謂覺樂等至名意者意云我若能令九德不合俱能起智即名為我今此意令九德不和合與能起智者名意也問言不和合者為總不和合為亦和合耶答不以道不和合即總不和合此意雖亦和合九德不如他我和合九德有勝用故故不和合其實亦和合但不勝也祕曰色依一實名為一依者意云一實者一實極微雖然也依一實極微眼若取時要頂多極微合方為境極微為因色境有故祕曰今説其境體依一實者意云境體依多極微成故所以説色依於一實也非依一色即眼能取者意云要多極微合方眼得色境非依一色微而眼所得也雖見言非一依色即眼能取者父似對意説非依一個色極微而眼能取也彼論云已下至名非現量者意云引證也意云且如色依一個極微果皆非現量色境既爾香等亦然祕曰或據其體是眼所取者意云極微是色色體要有多微而成色所以眼得色亦得一實極微據此道理云得微其實不可得以此理微非現量祕曰不是許眼取一微色者乘説多微和合方得也祕曰瓶待為異者意云且如微量短量俱二微上立長量大量即向三微上立今得二微對三微説所以短長對大名微大對微亦爾所以説瓶待待言不是當微上短對微説相瓶待也三微亦爾自對故祕曰相順名同者意云此法雖是前後由相順故亦得名同如煙火等有同時有異時故祕曰有云至名為見同者此師意説要須因果同時見故故名同也祕曰如見禾盛名為見同至有不遍失有意云如見好禾苗亦知種子而見好種時見好禾亦得名見同豈見禾時亦見能生因種子耶既不見者明知不得約因果同時名見同也有不遍失者若言煙火因果必同時故名見同時故名見同者有不遍失何以見好禾時雖表因好而不見因故明知因果非一切同故故有不遍失也祕曰見不同故比者至所有智生者意云夫因果皆相屬一義和合人有違相猶彼因果一義和合即今此因果和合合相畢竟不現故云畢竟不現見境者宗説和合因果相應可現見境由違緣損所以此境畢竟不現也若此智生者即名比智如世間禾被雨相損等是也祕曰或離染緣至之因者意云離染緣者即是正智喜躍之因喜躍屬智也問如何名離染緣答世有聰明之人崇近善友遠惡智識具慚愧故修習正法修此法時能發生當來正智而生喜躍故離染緣而為正智之因也祕曰是遮德等至而能緣也者意云由此異故遮心心所法不緣德等表心心所而緣實等若無此異句者緣一法之時應緣一切法問何故不先遮緣實而乃先遮緣德等耶答夫德不自有要由實是所依德是能依所以先遮德不遮實等實是本故不得先遮實也祕曰遮彼覺因者即遮德等念緣表此覺因者即表此緣實等法祕曰俱分者意云言者即實德業各有體故名俱分者體類各別各分分者即別類之義也祕曰名為總異者即實德業二句二句總亦相望名為總異祕曰總同者雖有九實總束為一實句名總同也德業亦準此祕曰名為別同者意云且如一實地極微時雖有多地極微總得名地名為別同極微體多名別俱是地故名同祕曰一一義差名為別異者即約多極微體説祕曰在於色上即眼根取餘根亦爾者意云由異在於故所以但眼取由異不於聲故準耳根取餘根準此祕曰但總相言有別俱分者意云但喚九實名別俱分故云總相而不説空等體有多名利俱分德業亦爾也祕曰一切實和合於一實者意云謂無實惑一一地等皆有衆多極微雖有多種總名一實句故故一切實和合一於實也即總俱分也祕曰及彼一義差別俱分義者意由一實義故而能和合地等諸法由其德義能和合於色而令眼等得於色等有業義故能令有取於等事祕曰業等合時有所依實者意云夫論合者要須待因而方有合如來與空合時須得種子等像禾生方與空合也如言業等合時有所依實者如雨禾相猶亦業合此禾衆多地等極微所成故未合時有所依實也故云業等合時所依實也離名無常者緣一向與實離故所以無常離者即合離義豈有分離與是常耶祕曰由於粗地為同類因故皆無常者意云即子微已上名粗地等為同類因既是無常明知粗地等上色香味觸亦是無常祕曰微色者即父母極微意説果微從父母極微生即父母極微色與子微為同類因但是色故祕曰約因明德故名因門者意云彼論中約因緣道理以明於德句也即大合為因而生香德豈不以大因而明香德耶祕曰兩大極微與生子微者意兩大父母極微能生得香微者即香微已問依彼計云香唯地有如何合言兩大微而生香微即香微在於大上有是不違彼計耶答香雖地有不因大微香德不順據其顯説且香微依大亦妨於地有也雖有此解道理不當故云皆違彼論也或可此通善得其超設若依者義二不違祕曰覺等十三至有十三性者意云然覺未十三德體是無常不依實辨故但有十三同類合明者即十三德體同是無常故稍同類也一處説故云稱合明然香色等四約地等實法以辨若地等父母極微有香是無常如疏言無常若子微上有即是無常能依香等亦無常也祕曰此色等十隨其所應通常無常極微子微有差別故色等十者地有四德謂色香等四水有三除香火有二除味風有一唯觸故十種祕曰堅亦大微亦名為大者意執大亦堅硬與無流轉故不得液性也祕曰以理言之至能依通常者意云色依火極微所以得通常色不依地大父母極微所以無常也問若不依者如何前言眼所取一依名色耶答約餘水火二父母極微説不依地説祕曰但非恆無名無常者意云此無説句所作何名無常以不是無故法若有時名無即轉無轉無為省故無是無常有恆無之法即是常故曰兔角亦非所作無説句中收是無常耶答無説言通得多無令言無説是無常者據不是恆無者説是恆無者而不説故言總意別祕曰有義空依聲依至亦為現境者意云此有義家難云地等是色依眼得色時亦得地空既得與聲所依耳得聲時亦得空二理既齊何方遣難今演祕答意云地等是所見眼得色時亦得地空體非所聞耳得聲時不聞空故説空等現是恆也祕曰若依附大非一實是名現境者意云等若云依附一實極微不得名現境若依附粗色即得名現境大非一實者即子微已上粗色也大者非小非一實者即多極故也祕曰但能造因不作異故者意云我雖能造因而不作果但受地所造之果問既能造因之豈不能感果耶答今約直受果説不約造因得因得果既以造因得果隔一重故祕曰準有行説者意云十句中準四句能生果謂實德業有能餘五句合不生然無説句雖有常無常無而不生果非此所説離無體故不破也然後等十德能生果言十德者謂色味觸液數別量因重合汁十德雖通常與然生果也祕曰五是現量者謂德業同俱會五非現量也祕曰不要相形方名多者但數也不一即名為多不似須多少相瓶名多也祕曰六句可知者意云實等六句外道本宗十句不攝得六句故云可知六句攝十句如下廣解也祕曰有義通似至後説時者意云言多實有者六通似法猶軍林等即是似也若依前解唯説六句為實者即不攝得假法若依後解即九句是實除無説句故名多實即多分實故非皆總實故軍林等亦在其中明知後説勝之若唯説前六句者即不攝軍林六句也祕曰為遮此故不言無作者意云為遮不定所以將無作用為因祕曰若再至何不遮耶者意云答將常住不生果為因者即此因於如上亦得轉以真如常住不生果故二為不定解如下有文祕曰豈不有法成於有法者意常住不生果本是有法今還將作因既將有法為因豈不有法成有法耶問此乃是有法成因何故言有法成有法答此因體即是前有法轉前有法為今因故故言有法成有法約本而説以因體本是有法故祕曰因無所依者疏將前有法為因故因無所依也祕曰問今他比量至何非不定者意云設許人於不定過之我等常法不生果者為如兔角不生果故離識有體耶此即説許耶為如合離等德不生異故離識有體耶此出不定過問此不定過成不答不成何以故夫論不定過兩家共許今大乘既不許合離等離識別有如何得成不定過祕曰答至其如楚越意云楚越二國守理令殊因明疏中割折三種比量道理令殊猶如楚越三種比量者所謂自比量他比量共比量因明家辨三種比量極是分明如何今問是他比量何非不定過耶祕曰而此論至猶爾者意云如因明疏家割折極是分明若於此論往往渾雜者雖立有自地比量而共不是分明故定渾雜甘蒿猶參者意釋渾雜之義然草蒿與參相似者不識者於甘蒿上妄生參解問如大乘法師曉洞叵自唯識自他比量猶似明珠何故於此論中往往義文相離答非不自間顯示方隅有其二意云一者試諸學者而悟不耶俱舍論有斯意者即俱舍論中世親菩薩往往有此文云我不説者但試諸學者爾祕曰二餘因明師至故示庀謬者意云謂諸因明師於一因過不分別九例今大乘法師亦隨他前因明師語所以不分別也又欲發生覺慧故示庀謬也庀謬者即是詞疏理謬也祕曰今因異喻者意云同是常住覺等無常故是異喻故云喻異於喻覺即等祕曰宗因同異者意云宗言應非離識即覺等且不離識故覺等是字同品也因異者意顯覺等是同家異喻也祕曰種門九句其亦為正因者意云明句當第八句即是同亦有非有異亦非有雖問亦一分轉亦得為因如何如立聲是有法定是無常宗因云勤勇無間所發性故喻如云瓶喻也今言因亦有者即瓶因同品故云同品有非有者即電光非是因同喻故云非有也雖瓶一分是因同品電光一分非是因同品以是宗同品故云得為正因也今常住因亦然雖於覺樂上兔角上有以是宗同品故亦為正因也猶如勤勇無間因雖電上無是宗同品為正因也言同品一分轉者若以電瓶為同喻瓶有勤勇無間性故得為因品電光勤勇無間所發性故所以不得為同品故定分轉亦為正因雖電瓶一種為宗同品若望因即一分轉一分不轉雖一分電上不轉亦為正因也常住因亦爾雖覺等上無謂兔角上有為正因祕曰無等亦但是宗同品者為無等不離識故祕曰彼論云全明能生果者意云雖覺為因然生果也一體別體彼覺為因者即由彼覺為因故而生分別一體別體法若無充等不能分別一體多體法故言此體彼體以遠近充為因者意云以近遠覺為因作能分別此體由遠充為因分別彼體即自根取者為彼自身諸根相對名彼此非對他身也祕曰若準疏科至分所攝也者意云此地水火三一段之文準前疏科文不攝此一段無也祕曰身得觸至身得地等者意云觸依地等者意云觸依地有身若得觸持亦得於地等祕曰根境相對者意云身根但得觸地雖有色而身根本得色色但眼得非身根得故祕曰非得地等一切之德者意云不以道無依地亦令身根得何以故以根境不相對故祕曰彼以似實俱名地者意云若佛法中堅法為地色為似地若外道將眼見色名寶地今言假實俱名地者諸地為假地望他宗色與監性總名為地祕曰違彼此論者意云彼外道十句論此者即唯識論也祕曰他隨一過者意云準疏中説實中大不異德中觸謂大乘自許實中大不與德中觸故故犯隨一過也問如四大皆有觸何故不説地等不異德中觸偏説大不異德中觸何答如餘三大具色等三四一多少不定唯有大大唯具二種所謂色觸所以大色異於偏也今就他宗他宗不許大即是觸故就他宗而無過失也祕曰因便不定者意云若但取一德句宗不等餘者有不定過過云此德句為如石女兒非實攝故即離識已外無體耶為如大有等非實攝故而離有體耶祕曰即一宗因者即一宗一因也祕曰後別立一者意初量不簡一體多體總成八句為一量後非有實等準初一體法説所以將非有為因別立一量總為二量破於九句也祕曰非準局在非有實二者意云不以將非實非有為因比量即局於二處於九句之中隨作法得祕曰許為他識俱有根故者意云第八識許與他識作俱有根也祕曰宗有一分他所別過失者意云他者即佛法名他也即是外道復量對他佛法佯宗犯一分所別過祕曰因亦一分極他一過者意云外道復量對他佛法因有一分極一過也即對他犯極一過故名極一過也祕曰有義至無法方無者意云總是有義家敘勝論師救意也祕曰解云至一常者堆宗解也祕曰可謂白圭而猶玷矣者意云有義救詞釋旨甚佳然言疏闕闕何若言我法有因果今俱生滅故不待有來有者且如無為亦名離繫果亦名能作因用言也即無為因果而有生滅耶斯言濫有故言疏闕可謂白圭而猶玷矣且如白圭雖是好寶若有微玷人不美重今若因果生滅救自義者道理雖佳詞中有濫無為因果非生滅故亦猶白圭而有瘕玷也圭者玉也祕曰若偏難常至不簡者意云責有義家不簡一所由若言我因果無常故即俱有生滅不待有來有汝因果是常應行有來有者何故所救文中與不簡耶祕曰汝實等法有同起者意云汝實等法以有為因而方起者即實等並應非一非常意説若實等法待因方起即實等法應非一常即空等非一父母極微應非常祕曰即因明天主至應非真破者意云因明論中天主菩薩敘外人法自相相違過遂云汝大有性應非大有性緣者汝字遂簡自宗所以比量得成真破無有法自相相違過何故今言汝字仍有自語相違過耶廣如因明疏説天主者商羯羅菩薩也此名天主祭天得故祕曰即有有法成有失者意云若將有法復為喻者即者者法成有諸失問若將有法為喻乃是有法成喻何關有有法成有法過耶答以即將法與為喻故約本與説喻是有法且得名有法成有法失祕曰非取上言實德業之者意云但用勿此亦非實德業性當句為亦宗而不取又彼所執實德業至理定不然去文也何故問答彼但總非不為量也祕曰有義亦等總宗之喻至如合句義者意云如德業等者等取總宗之喻也問何者是總宗之喻答即非宗等三句謂和合句意説之同異性是有法耳實等性是宗因因以異實等故如和合句若將實德等三句轉為宗為喻即名為別宗別喻如疏説若以和合為喻總破同異性非實等性即名總宗之喻也祕曰之成根境者言顯極微非理境明知實句通非現得即之句全二中分者意云三句者謂業大有同異三句全現量得實德二句中少分非現得撿前諸門非現現境門即知祕曰豈可前後自相魚肉者意云魚肉者即大小魚相取食如意説疏主前諸門義中説五句是現量豈可如今説實德等非現量耶豈可前後自相嚴食如魚肉也祕曰有法名法者即喚有法名法不是宗法也祕曰論説緣言在於法中者意云此緣字法之中難之若其實等有法之中先不許覺等無今於宗法之中説置緣字亦何能簡有法過也故置緣言但簡違宗過不得簡相付過言在相從者既許一心遍緣二境二境相從名一所緣境不可一心並緣一境只可二境合處故云在相從不相離邊説置緣言亦何所簡祕曰由此唯言簡此不得者意云若有唯字者雖簡得別緣不簡得通緣也謂簡通緣不得故所以亦不用唯字但依論定祕曰論大自在天至涅槃論云者意云提婆菩薩造涅槃論於中敘外道少乘計也謂造人涅槃經名涅槃彼處敘云即事摩醯首羅論師作如是説大自在天者有其三名一名梵天二名那羅延三名摩醯首羅問夫言有其三名一名梵天二名那羅延三名摩醯首羅問夫言有因必滅其果如何因果名一造耶答不言造因不能感果但所望別故言因果各別造即前後相望得名鳥正造因時名梵天果若熟時即名那羅延造也祕曰地是依處至地是身者意云摩醯首羅以虗空為頭大地為身問何故前言地是摩醯首羅依處如今即言是身耶答依止以解身巳地是摩醯首羅依處者意云説地是摩醯首羅身故祕曰自在天是生滅因羅身為生滅因也自在天者即摩醯首羅也居色天上者即居色究竟天也祕曰圍陀論師至祖翁者意云圍陀論師即明論師也彼師説從那羅延齊中生之祖翁也然造一切命非命物邊故名祖翁也問那羅延與梵天既一身異名如何高中生梵主那答亦無其失然如自受用身流出化身教化有情令斷惡修善得生勝處等祕曰化作山野至得彼處生者意云即山中禽獸皆化及人中豬羊等類若害殺供養梵天復當得生彼處祕曰言時者至時滅者意云外道所計真間之物有盛有衰皆由時也祕曰謂本生安茶論師者即從所事以得其名也安茶者即本生也即是情靈神異之物亦猶如神我相似能造一切故意云當無始之時未有日月星虗空地等當時唯有火水於火水中有大安茶生如雞子周匝金色等祕曰由許聲性至而作不定者定云若聲性常後許不能詮下論破中彼外人即將東域傳燈目録云演祕釋五卷如理今獲其第一卷一册於藥師寺經庫便寫得了明治三十一年春南京應理末學定胤
